description: |
  헤딩 5 단계 + 본문 단락 혼합. 변환기는 마크다운 # 의 개수에 따라
  "개요 1"~"개요 5" 스타일을 부여하고, 평문 단락은 "본문" 스타일을
  유지해야 함.

style_sequence:
  - 본문        # "본문 단락입니다."
  - 개요 1      # "# 제목1"
  - 개요 1      # "# 제목1" (같은 레벨 반복)
  - 개요 2      # "## 제목2"
  - 개요 3      # "### 제목3"
  - 개요 4      # "#### 제목4"
  - 개요 5      # "##### 제목5"
  - 본문        # "본문으로 복귀한 단락입니다."

text_sequence:
  - "본문 단락입니다."
  - "제목1"
  - "제목1"
  - "제목2"
  - "제목3"
  - "제목4"
  - "제목5"
  - "본문으로 복귀한 단락입니다."
