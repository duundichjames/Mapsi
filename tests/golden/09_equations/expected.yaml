description: |
  수식 (LaTeX) → hp:equation 변환을 검증한다.

  수식 자리에는 진짜 ``hp:equation`` 노드가 들어가며, 단락 자체의 스타일은
  인라인/디스플레이 모두 "본문" 그대로다 (수식 전용 스타일·정렬 없음).
  골든은 검증 유틸(inspect) 이 hp:equation 을 ``[수식]`` 자리표시로 노출한
  결과로 **수식의 존재·위치만** 검사한다. HNC 문자열의 정확한 내용은
  ``test_hnc`` 와 빌더 테스트(``test_equation_builder``) 가 책임진다.

  단락 구성:
    1. 인라인 수식이 박힌 본문 → "… [수식] …"
    2. 디스플레이 수식 직전의 안내 본문
    3. 디스플레이 수식 = 본문 단락 안에 ``[수식]`` 하나
    4. 디스플레이 수식 뒤의 평문 본문

style_sequence:
  - 본문
  - 본문
  - 본문
  - 본문

text_sequence:
  - "본문에서 [수식] 와 같이 인라인 수식을 쓸 수 있습니다."
  - 다음은 디스플레이 수식입니다.
  - "[수식]"
  - 수식 뒤의 평문 단락입니다.
