description: |
  Phase 9 — 수식 (LaTeX) 의 평문 마커 변환을 검증한다 (ADR 0002).

  ``hp:equation`` XML 직접 emit 은 v0.2 로 미루고, 모든 수식은
  ``[hnc 수식]…[/hnc 수식]`` 평문 마커로 본문에 박힌다. 단락 자체의
  스타일은 인라인/디스플레이 모두 "본문" 그대로이며, 수식 전용 스타일은
  존재하지 않는다.

  ``MAPSI_NO_LLM=1`` 이 ``conftest.py`` 에서 강제되므로 마커 안 본문은
  LaTeX 원문이 그대로 나온다 (LLM 변환 결과는 비결정적이라 골든으로
  검증할 수 없으며, ``test_math.py`` 가 mocked 분기 테스트로 책임진다).

  단락 구성:
    1. 인라인 수식이 박힌 본문
    2. 디스플레이 수식 직전의 안내 본문
    3. 디스플레이 수식 = 본문 단락 안에 마커 텍스트만
    4. 디스플레이 수식 뒤의 평문 본문

style_sequence:
  - 본문
  - 본문
  - 본문
  - 본문

text_sequence:
  - "본문에서 [hnc 수식]a^2 + b^2 = c^2[/hnc 수식] 와 같이 인라인 수식을 쓸 수 있습니다."
  - 다음은 디스플레이 수식입니다.
  - "[hnc 수식]\\frac{1}{N} \\sum_{n=1}^{N} x_n = \\bar{x}[/hnc 수식]"
  - 수식 뒤의 평문 단락입니다.
