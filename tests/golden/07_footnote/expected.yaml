description: |
  Phase 7 — Pandoc 각주 (`[^id]` 본문 + `[^id]: 정의` 블록) 의 종단 검증.

  - 본문 paragraph 안의 ``[^1]`` 가 ``hp:footNote`` 노드로 인라인 임베드된다.
    한/글 출력 패턴과 동일하게 ``hp:p > hp:run`` 안에서 ``hp:t`` 와
    ``hp:ctrl(hp:footNote)`` 가 마커 위치에 따라 번갈아 등장.
  - 각주 본문은 ``hp:footNote > hp:subList > hp:p[styleIDRef=각주]`` 로
    임베드되며, ``inspect`` 가 본문 ``hp:p`` 의 텍스트에서는 제외하고 (이중
    카운트 방지) 별도 "각주" 스타일 단락으로 따로 열거한다.
  - 원문 라벨 ('1', 'second') 은 무시되고 등장 순서로 0,1,... id 가 부여된다
    (markdown-it footnote plugin 이 자동 처리). hp:autoNum 의 num 은 1-base
    (= id+1) 로 emit; 한/글 뷰어가 자동 재계산.
  - 각주 본문 텍스트는 한/글 표기 관습대로 앞에 공백 1개가 붙는다 (자동번호
    "1)" 와 본문을 분리하기 위함). inspect 도 그 공백을 그대로 노출.
  - 본문 텍스트는 마커 자체를 *제외* 한 평문이며, ``inspect`` 는 본문 단락에
    각주 라벨을 표시하지 않는다 (한/글이 자동번호로 표시).

style_sequence:
  - 본문
  - 각주
  - 본문
  - 각주

text_sequence:
  - 나의 살던 고향은 꽃피는 산골.
  - " 첫번째 각주 본문입니다."
  - 복숭아꽃 살구꽃 아기 진달래.
  - " 두번째 각주 본문입니다. 원문 ID 는 무시되고 등장 순서에 따라 2 번 각주가 됩니다."
