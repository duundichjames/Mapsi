description: |
  순서 없는 목록 3 단계 중첩 + 본문 단락. 변환기는 마크다운 들여쓰기 2 칸
  단위로 깊이를 인식하여 1 단계는 "네모", 2 단계는 "동그라미", 3 단계는
  "줄" 스타일을 부여해야 함. 글머리 기호(-) 자체는 출력 텍스트에 포함되지
  않음 (한/글 스타일이 글머리 표식을 담당).

style_sequence:
  - 본문            # "목록 앞의 평문 단락입니다."
  - 네모            # "- 나의 살던 고향은 꽃피는 산골"
  - 동그라미        # "  - 복숭아꽃 살구꽃 아기 진달래"
  - 줄              # "    - 울긋불긋 꽃대궐 차리인 동네"
  - 네모            # "- 두번째 최상위 항목"
  - 본문            # "목록 뒤의 평문 단락입니다."

text_sequence:
  - "목록 앞의 평문 단락입니다."
  - "나의 살던 고향은 꽃피는 산골"
  - "복숭아꽃 살구꽃 아기 진달래"
  - "울긋불긋 꽃대궐 차리인 동네"
  - "두번째 최상위 항목"
  - "목록 뒤의 평문 단락입니다."
