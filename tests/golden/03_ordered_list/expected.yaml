description: |
  순서 있는 목록 2 단계 중첩 + 본문 단락. 변환기는 마크다운 들여쓰기 단위로
  깊이를 인식하여 1 단계는 "번호1", 2 단계는 "번호2" 스타일을 부여해야 함.
  마크다운의 "1." "2." 등 번호 텍스트는 한/글 자동번호 스타일이 처리하므로
  변환 결과의 hp:t 텍스트에는 포함되지 않음 (한/글이 스타일에 정의된
  번호 형식으로 자동 부여).

style_sequence:
  - 본문            # "순서 있는 목록 도입 단락입니다."
  - 번호1           # "1. 첫 번째 안건 검토"
  - 번호2           # "   1. 회의록 사전 회람"
  - 번호2           # "   2. 의제 우선순위 확정"
  - 번호1           # "2. 두 번째 안건 토의"
  - 번호2           # "   1. 발표자 배정"
  - 번호1           # "3. 세 번째 안건 결의"
  - 본문            # "마무리 평문 단락입니다."

text_sequence:
  - "순서 있는 목록 도입 단락입니다."
  - "첫 번째 안건 검토"
  - "회의록 사전 회람"
  - "의제 우선순위 확정"
  - "두 번째 안건 토의"
  - "발표자 배정"
  - "세 번째 안건 결의"
  - "마무리 평문 단락입니다."
