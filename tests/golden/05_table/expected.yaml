description: |
  표 + 캡션 승격 검증.
  - 표 직전 단락 "표 1. 분기별 매출" 이 캡션으로 승격된다 (ADR 0001).
  - 헤더 행과 본문 행 모두 "표내용" 스타일을 받는다 (모두 통일).
  - 캡션 텍스트는 "표  분기별 매출" (이중 공백) 로 추출된다.
    이유: <hp:t>표 </hp:t> + <hp:autoNum/> + <hp:t> 분기별 매출</hp:t>
    구조이며 inspect 가 hp:t 들만 합치므로 autoNum 의 숫자 자리는 빠진다.
    한/글 뷰어에서는 "표 1 분기별 매출" 처럼 정상 표시.
  - 표 wrapper paragraph (본문 빈 단락) 는 filter_nonempty 가 걸러내므로
    style_sequence 에 포함하지 않는다.

style_sequence:
  - 본문
  - 표캡션
  - 표내용
  - 표내용
  - 표내용
  - 표내용
  - 표내용
  - 표내용
  - 표내용
  - 표내용
  - 표내용
  - 본문

text_sequence:
  - 앞 단락 본문입니다.
  - "표  분기별 매출"
  - 구분
  - Q1
  - Q2
  - 매출
  - "100"
  - "200"
  - 비용
  - "50"
  - "80"
  - 뒤 단락 본문입니다.
