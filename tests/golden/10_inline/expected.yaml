description: |
  Phase 10 인라인 서식 (ADR 0004) 회귀 픽스처. 마크다운 인라인 5종
  (`**bold**`, `*em*`, `~~strike~~`, `` `code` ``, `[label](url)`) 과
  중첩 (`***bold italic***`) 을 한 문서에서 함께 검증한다.

  본 골든은 단락 *수준* 의 (스타일 이름, 평문) 시퀀스만 비교한다 —
  인라인 마크가 단락 평문 안으로 평탄화되며 마크다운 구분자
  (`**`, `~~`, 백틱, 대괄호 + 괄호) 는 제거되고 라벨/내용은 그대로
  보존되어야 한다. 인라인 charPrIDRef 분배의 정확성은 단위 테스트
  (tests/test_elements.py::TestInlineFormattingParagraph) 가 담당.

  링크 `[한컴 사이트](https://www.hancom.com)` 는 라벨 "한컴 사이트"
  만 평문에 들어가고 URL 은 폐기 (ADR 0004 결정 1).

style_sequence:
  - 개요 1     # "# 인라인 서식 데모"
  - 본문       # "문장 안에서 ..." (bold + italic + strike)
  - 본문       # "함수 parse_markdown() ..." (code)
  - 본문       # "굵고 기울인 조합 ..." (bold+italic)
  - 본문       # "링크는 한컴 사이트 ..." (link 라벨만)
  - 본문       # 평문 마무리

text_sequence:
  - "인라인 서식 데모"
  - "문장 안에서 굵은 글씨 와 기울인 글씨 그리고 취소선 을 섞어 쓸 수 있습니다."
  - "함수 parse_markdown() 은 인라인 코드를 모노스페이스로 보여 줍니다."
  - "굵고 기울인 조합도 한 단어로 묶을 수 있습니다."
  - "링크는 한컴 사이트 처럼 라벨만 보존됩니다."
  - "본문 평문 단락으로 마무리합니다."
