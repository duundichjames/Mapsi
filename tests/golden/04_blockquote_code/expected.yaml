description: |
  인용문 + 펜스드 코드 블록 + 본문 단락 혼합 검증.
  - blockquote 안의 단락은 모두 "인용" 스타일로 변환
  - 코드 블록은 줄당 1 단락 ("코드" 스타일)
  - 코드 안의 들여쓰기 공백은 hp:t 텍스트에 그대로 살아남는다
  - 인용 안의 빈 줄(>)은 단락 구분자이므로 별도 블록으로 안 나옴

  주의: 골든 비교는 filter_nonempty 로 빈 텍스트 단락을 제외한다
  (빈 텍스트는 secPr 호스트 단락과 구분되지 않기 때문). 코드 안의
  빈 줄 보존 여부는 test_parser.py 의 단위 테스트가 별도 검증한다.

style_sequence:
  - 본문            # "아래는 인용문 예시입니다."
  - 인용            # "진실은 단순함이라는 옷을 입고 나타난다."
  - 인용            # "— 익명"
  - 본문            # "이어서 코드 예시를 보입니다."
  - 코드            # "def greet(name):"
  - 코드            # "    print(f\"Hello, {name}!\")"
  - 코드            # "greet(\"Mapsi\")"
  - 본문            # "마무리 평문 단락입니다."

text_sequence:
  - "아래는 인용문 예시입니다."
  - "진실은 단순함이라는 옷을 입고 나타난다."
  - "— 익명"
  - "이어서 코드 예시를 보입니다."
  - "def greet(name):"
  - "    print(f\"Hello, {name}!\")"
  - "greet(\"Mapsi\")"
  - "마무리 평문 단락입니다."
