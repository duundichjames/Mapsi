description: |
  Phase 6a — 그림 구조 인식 검증 (이미지 바이너리 임베드 없음).

  - "![alt](src)" 단독 단락이 "그림" 스타일 단락으로 변환된다.
  - 그림 직후 "그림 N. xxx" 단락이 "그림캡션" 스타일로 승격된다 (ADR 0001
    일반화). 접두사 "그림 N. " 는 제거되고, 한/글 autoNum (numType=PICTURE)
    이 자리를 채운다.
  - 캡션 텍스트는 표 캡션과 동일하게 "그림  본문" (이중 공백) 으로 추출된다.
    이유: <hp:t>그림 </hp:t> + <hp:autoNum/> + <hp:t> 본문</hp:t> 구조이며
    inspect 가 hp:t 들만 합치므로 autoNum 의 숫자 자리는 빠진다. 한/글
    뷰어에서는 "그림 1 본문" 처럼 정상 표시.
  - 빈 alt 의 그림 (no_alt.png) 은 그림 스타일 단락이지만 placeholder 텍스트
    가 없으므로 filter_nonempty 가 걸러낸다 (Phase 6b 에서 hp:pic 추가 시
    inspect 가 그림 자리를 어떻게 표기할지 재검토 예정).

style_sequence:
  - 본문
  - 그림
  - 그림캡션
  - 본문
  - 본문

text_sequence:
  - 앞 단락 본문입니다.
  - 농림사업정보시스템의 개요
  - "그림  농림사업정보시스템의 개요"
  - 중간 단락입니다.
  - 뒤 단락 본문입니다.
